<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <title>SD-OutfitHub 管理站</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <header>
        <h1>SD-OutfitHub 管理站</h1>
        <div class="header-desc">Stable Diffusion 服装提示词的本地管理与检索</div>
    </header>

    <div id="tab-chars" class="container active">
        <div class="card">
            <div class="editor-title">新增角色分组</div>
            <div class="inline-add">
                <input id="char-group-title-input" type="text" placeholder="输入角色分组名称，例如：🧝 精灵射手" />
                <button id="char-group-add-btn" class="copy-btn" type="button">新增角色</button>
            </div>
            <div class="hint-text">提示：人物提示词请在对应角色卡片中直接新增或编辑。</div>
        </div>

        <div class="card">
            <div class="editor-title">标签筛选</div>
            <div id="char-tag-filters" class="tag-filter-wrap"></div>
            <div class="hint-text" style="margin-top: 8px;">提示：先在角色卡片中编辑标签，再使用这里筛选角色。</div>
        </div>

        <div class="card">
            <div class="editor-title">名称搜索</div>
            <div class="search-filter-wrap">
                <div class="search-row">
                    <input id="char-name-search" class="search-input" type="text" placeholder="输入关键词，匹配角色名称" />
                    <button id="char-name-search-clear" class="copy-btn secondary-btn" type="button">清空</button>
                </div>
                <div class="hint-text">支持中文和英文关键词，例如：缪尔、goldenglow、Amiya。</div>
            </div>
        </div>

        <div id="list-chars"></div>
    </div>

    <div id="tab-actions" class="container">
        <div class="card">
            <div class="hint-text">提示：动作提示词请在对应分组卡片中直接新增或编辑。</div>
        </div>
        <div id="list-actions"></div>
    </div>

    <div id="tab-env" class="container">
        <div class="card">
            <div class="hint-text">提示：环境提示词请在对应分组卡片中直接新增或编辑。</div>
        </div>
        <div id="list-env"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('chars', this)">
            <div class="nav-icon">👤</div>
            <span>人物</span>
        </div>
        <div class="nav-item" onclick="switchTab('actions', this)">
            <div class="nav-icon">🏃</div>
            <span>动作</span>
        </div>
        <div class="nav-item" onclick="switchTab('env', this)">
            <div class="nav-icon">✨</div>
            <span>环境质量</span>
        </div>
    </nav>

    <div id="toast">已复制到剪贴板</div>

    <script src="/scripts/core/state.js"></script>
    <script src="/scripts/core/utils.js"></script>
    <script src="/scripts/core/data.js"></script>
    <script src="/scripts/features/render.js"></script>
    <script src="/scripts/features/actions.js"></script>
    <script src="/scripts/features/events.js"></script>
    <script src="/scripts/core/main.js"></script>
</body>
</html>
